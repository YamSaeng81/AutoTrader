version: '3.8'

services:
  db:
    image: timescale/timescaledb:latest-pg15
    restart: always
    environment:
      POSTGRES_DB: crypto_auto_trader
      POSTGRES_USER: trader
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U trader -d crypto_auto_trader"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: always
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3

  backend:
    build:
      context: .
      dockerfile: web-api/Dockerfile
    restart: always
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: prod
      DB_URL: jdbc:postgresql://db:5432/crypto_auto_trader
      DB_PASSWORD: ${DB_PASSWORD}
      REDIS_HOST: redis
      CORS_ALLOWED_ORIGINS: http://${HOST_IP}:3000,http://localhost:3000,http://${DDNS_HOST}:3000
      UPBIT_ACCESS_KEY: ${UPBIT_ACCESS_KEY_ENCRYPTED}
      UPBIT_SECRET_KEY: ${UPBIT_SECRET_KEY_ENCRYPTED}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
      TELEGRAM_CHAT_ID: ${TELEGRAM_CHAT_ID}
      AES_KEY: ${AES_KEY}
    ports:
      - "8080:8080"

  frontend:
    build:
      context: ./crypto-trader-frontend
      dockerfile: Dockerfile
    restart: always
    environment:
      INTERNAL_BACKEND_URL: http://backend:8080
      AUTH_PASSWORD: ${AUTH_PASSWORD}
      AUTH_SECRET: ${AUTH_SECRET}
    ports:
      - "3000:3000"

volumes:
  pgdata:
