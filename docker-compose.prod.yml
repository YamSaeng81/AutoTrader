version: '3.8'

services:
  db:
    image: timescale/timescaledb:latest-pg15
    restart: always
    environment:
      POSTGRES_DB: crypto_auto_trader
      POSTGRES_USER: trader
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    restart: always

  backend:
    build:
      context: .
      dockerfile: web-api/Dockerfile
    restart: always
    depends_on:
      - db
      - redis
    environment:
      SPRING_PROFILES_ACTIVE: prod
      DB_URL: jdbc:postgresql://db:5432/crypto_auto_trader
      REDIS_HOST: redis
      UPBIT_ACCESS_KEY: ${UPBIT_ACCESS_KEY_ENCRYPTED}
      UPBIT_SECRET_KEY: ${UPBIT_SECRET_KEY_ENCRYPTED}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
      TELEGRAM_CHAT_ID: ${TELEGRAM_CHAT_ID}
      AES_KEY: ${AES_KEY}
    ports:
      - "8080:8080"

  frontend:
    build:
      context: ./crypto-trader-frontend
      dockerfile: Dockerfile
    restart: always
    ports:
      - "3000:3000"
    environment:
      INTERNAL_BACKEND_URL: http://backend:8080

volumes:
  pgdata:
