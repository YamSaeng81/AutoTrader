version: '3.8'

services:
  db:
    image: timescale/timescaledb:latest-pg15
    restart: always
    environment:
      POSTGRES_DB: crypto_auto_trader
      POSTGRES_USER: trader
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U trader -d crypto_auto_trader"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: always
    command: redis-server --requirepass ${REDIS_PASSWORD}
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3

  backend:
    build:
      context: .
      dockerfile: web-api/Dockerfile
    restart: always
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: prod
      DB_URL: jdbc:postgresql://db:5432/crypto_auto_trader
      DB_PASSWORD: ${DB_PASSWORD}
      REDIS_HOST: redis
      CORS_ALLOWED_ORIGINS: https://${DDNS_HOST},http://${HOST_IP}:3000,http://localhost:3000,http://${DDNS_HOST}:3000
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      UPBIT_ACCESS_KEY: ${UPBIT_ACCESS_KEY_ENCRYPTED}
      UPBIT_SECRET_KEY: ${UPBIT_SECRET_KEY_ENCRYPTED}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
      TELEGRAM_CHAT_ID: ${TELEGRAM_CHAT_ID}
      DISCORD_BOT_TOKEN: ${DISCORD_BOT_TOKEN}
      AES_KEY: ${AES_KEY}
      API_AUTH_TOKEN: ${API_AUTH_TOKEN}
      JAVA_OPTS: "-XX:-OmitStackTraceInFastThrow"
    ports:
      - "8080:8080"

  frontend:
    build:
      context: ./crypto-trader-frontend
      dockerfile: Dockerfile
    restart: always
    environment:
      INTERNAL_BACKEND_URL: http://backend:8080
      API_TOKEN: ${API_TOKEN}
      AUTH_PASSWORD: ${AUTH_PASSWORD}
      AUTH_SECRET: ${AUTH_SECRET}
    ports:
      - "3000:3000"

  db-backup:
    image: timescale/timescaledb:latest-pg15
    restart: always
    depends_on:
      db:
        condition: service_healthy
    environment:
      PGPASSWORD: ${DB_PASSWORD}
    volumes:
      - ./backups:/backups
    entrypoint: >
      /bin/sh -c "
        mkdir -p /backups &&
        while true; do
          FILENAME=/backups/backup_$$(date +%Y%m%d_%H%M%S).sql.gz &&
          pg_dump -h db -U trader crypto_auto_trader | gzip > $$FILENAME &&
          echo \"백업 완료: $$FILENAME\" &&
          find /backups -name '*.sql.gz' -mtime +7 -delete &&
          sleep 86400;
        done
      "

  prometheus:
    image: prom/prometheus:latest
    restart: always
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.retention.time=30d'
    ports:
      - "127.0.0.1:9090:9090"
    depends_on:
      - backend

  grafana:
    image: grafana/grafana:latest
    restart: always
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_SERVER_ROOT_URL: http://localhost:3001
    ports:
      - "127.0.0.1:3001:3000"
    depends_on:
      - prometheus

volumes:
  pgdata:
  prometheus_data:
  grafana_data:
