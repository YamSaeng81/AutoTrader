spring:
  application:
    name: crypto-auto-trader

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/crypto_auto_trader}
    username: ${DB_USERNAME:trader}
    password: ${DB_PASSWORD:devpassword}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
    open-in-view: false

  flyway:
    enabled: true
    locations: classpath:db/migration

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

  jackson:
    serialization:
      write-dates-as-timestamps: false

server:
  port: 8080

telegram:
  bot-token: ${TELEGRAM_BOT_TOKEN:}
  chat-id: ${TELEGRAM_CHAT_ID:855008981}
  enabled: ${TELEGRAM_ENABLED:true}

upbit:
  access-key: ${UPBIT_ACCESS_KEY:}
  secret-key: ${UPBIT_SECRET_KEY:}

api:
  auth:
    token: ${API_AUTH_TOKEN:dev-token-change-me-in-production}
