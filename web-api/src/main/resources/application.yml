spring:
  application:
    name: crypto-auto-trader

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/crypto_auto_trader}
    username: ${DB_USERNAME:trader}
    password: ${DB_PASSWORD:devpassword}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false

  flyway:
    enabled: true
    locations: classpath:db/migration

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}

  jackson:
    serialization:
      write-dates-as-timestamps: false

server:
  port: 8080

telegram:
  bot-token: ${TELEGRAM_BOT_TOKEN:}
  chat-id: ${TELEGRAM_CHAT_ID:855008981}
  enabled: ${TELEGRAM_ENABLED:true}

discord:
  bot-token: ${DISCORD_BOT_TOKEN:}

upbit:
  access-key: ${UPBIT_ACCESS_KEY:}
  secret-key: ${UPBIT_SECRET_KEY:}

api:
  auth:
    token: ${API_AUTH_TOKEN}

cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000}

management:
  endpoints:
    web:
      exposure:
        include: prometheus, health
      base-path: /actuator
  endpoint:
    health:
      show-details: never
    prometheus:
      enabled: true
  metrics:
    tags:
      application: ${spring.application.name}
