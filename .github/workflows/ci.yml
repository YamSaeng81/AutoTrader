name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  # ─── 백엔드 빌드 & 테스트 ───────────────────────────────
  backend:
    name: Backend (Gradle)
    runs-on: ubuntu-latest

    services:
      postgres:
        image: timescale/timescaledb:latest-pg15
        env:
          POSTGRES_DB: crypto_trader_test
          POSTGRES_USER: trader
          POSTGRES_PASSWORD: testpassword
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Build with Gradle
        run: ./gradlew build -x test
        working-directory: .

      - name: Run tests
        run: ./gradlew test
        working-directory: .
        env:
          SPRING_DATASOURCE_URL: jdbc:postgresql://localhost:5432/crypto_trader_test
          SPRING_DATASOURCE_USERNAME: trader
          SPRING_DATASOURCE_PASSWORD: testpassword
          SPRING_REDIS_HOST: localhost
          SPRING_REDIS_PORT: 6379
          API_AUTH_TOKEN: ci-test-token
          AES_KEY: test-aes-key-minimum-32-chars-here

      - name: Upload test report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: backend-test-report
          path: web-api/build/reports/tests/

  # ─── 프론트엔드 빌드 & 린트 ────────────────────────────
  frontend:
    name: Frontend (Next.js)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: crypto-trader-frontend/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: crypto-trader-frontend

      - name: Lint
        run: npm run lint
        working-directory: crypto-trader-frontend

      - name: Build
        run: npm run build
        working-directory: crypto-trader-frontend
        env:
          NEXT_PUBLIC_API_URL: http://localhost:8080
          INTERNAL_BACKEND_URL: http://localhost:8080
          API_TOKEN: ci-test-token
          AUTH_PASSWORD: ci-test-password
          AUTH_SECRET: ci-test-secret-minimum-32-characters

  # ─── Docker 이미지 빌드 (main 브랜치 push 시만) ─────────
  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [ backend, frontend ]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend image (no push)
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./web-api/Dockerfile
          push: false
          tags: crypto-auto-trader-backend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build frontend image (no push)
        uses: docker/build-push-action@v5
        with:
          context: ./crypto-trader-frontend
          file: ./crypto-trader-frontend/Dockerfile
          push: false
          tags: crypto-auto-trader-frontend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
